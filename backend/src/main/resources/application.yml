spring:
  application:
    name: factory-system

  datasource:
    url: jdbc:mysql://localhost:3306/factory?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080

jwt:
  secret: your-super-secret-key-change-this-in-production-min-256-bits-required-for-security
  expiration: 86400000  # 24시간 (밀리초)
